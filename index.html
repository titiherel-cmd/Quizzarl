<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizzARL</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: #111118;
            color: white;
            padding-bottom: 60px;
            margin: 0;
        }

        h1 {
            font-size: 28px;
            margin: 20px 0 6px;
            letter-spacing: 1px;
        }

        h1 span.logo-q {
            font-size: 32px;
            background: linear-gradient(135deg, #9b59b6, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px 28px;
            margin: 8px;
            font-size: 17px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: bold;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); opacity: 0.85; }

        input[type="text"] {
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #1e1e2e;
            color: white;
            width: 80%;
            max-width: 300px;
            display: block;
            margin: 10px auto;
        }
        input[type="text"]:focus { outline: none; border-color: #9b59b6; }

        /* --- BUZZER --- */
        #buzzer-btn {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff4444, #b00000);
            border: 8px solid #7a0000;
            box-shadow: 0 8px 0 #5a0000, 0 12px 28px rgba(180,0,0,0.4);
            font-size: 28px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.08s;
            margin: 32px auto;
            display: block;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }
        #buzzer-btn:active:not(:disabled) {
            transform: translateY(7px);
            box-shadow: 0 1px 0 #5a0000, 0 4px 10px rgba(0,0,0,0.5);
        }
        #buzzer-btn:disabled {
            background: radial-gradient(circle at 35% 35%, #444, #2a2a2a);
            border-color: #1a1a1a;
            box-shadow: 0 4px 0 #111;
            cursor: not-allowed;
            color: #555;
        }

        /* --- BUZZ LIST (hôte) --- */
        .buzz-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a2e;
            border-radius: 10px;
            padding: 12px 16px;
            margin: 8px auto;
            max-width: 520px;
            border-left: 5px solid #9b59b6;
        }
        .buzz-entry:first-child { border-left-color: #f1c40f; }
        .buzz-entry:nth-child(2) { border-left-color: #bdc3c7; }
        .buzz-entry:nth-child(3) { border-left-color: #cd7f32; }

        .buzz-rank { font-size: 24px; margin-right: 12px; }
        .buzz-name { font-size: 18px; font-weight: bold; flex: 1; text-align: left; }

        .points-btns { display: flex; gap: 6px; }
        .pt-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        .pt-btn:active { transform: scale(0.93); }
        .pt1 { background: #27ae60; }
        .pt2 { background: #2980b9; }
        .pt3 { background: #8e44ad; }

        /* --- HOST PANEL --- */
        #host-panel {
            background: #16161f;
            border: 1px solid #2a2a40;
            border-radius: 14px;
            padding: 20px;
            margin: 16px auto;
            max-width: 560px;
        }
        #host-panel h2 { margin: 0 0 16px; font-size: 18px; color: #aaa; }

        .host-action-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        /* --- SCORE JOUEUR --- */
        #player-score-zone {
            background: linear-gradient(135deg, #9b59b6, #3498db);
            padding: 10px 20px;
            margin: 10px auto;
            max-width: 320px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        /* --- ROUND ENDED --- */
        #round-ended-zone {
            background: #1a1a2e;
            border: 1px solid #333;
            padding: 24px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 380px;
        }
        #round-ended-zone h2 { margin-top: 0; }

        /* --- SCOREBOARD --- */
        #scoreboard-zone {
            margin: 30px auto 0;
            border-top: 1px solid #2a2a40;
            padding-top: 20px;
            max-width: 420px;
        }
        #scoreboard-zone h3 { color: #aaa; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
        #score-list { list-style: none; padding: 0; margin: 0; }

        /* --- STATUS TEXT --- */
        #buzzer-status-text { font-size: 18px; color: #ccc; margin-bottom: 0; }
        #buzzer-feedback { font-size: 15px; color: #aaa; min-height: 22px; margin-top: 8px; }

        .mode-badge {
            display: inline-block;
            background: #2a1a3e;
            color: #9b59b6;
            border: 1px solid #9b59b6;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1><span class="logo-q">?</span> QuizzARL</h1>

    <!-- LOGIN JOUEUR -->
    <div id="login-zone" style="display:none;">
        <p class="subtitle">Entre ton pseudo pour rejoindre</p>
        <input type="text" id="pseudo" placeholder="Ton pseudo…" maxlength="20" autocomplete="off">
        <button class="btn" style="background: linear-gradient(135deg,#9b59b6,#3498db);" onclick="joinGame()">Rejoindre</button>
    </div>

    <!-- SCORE JOUEUR -->
    <div id="player-score-zone" style="display: none;">
        Mon score : <span id="my-score">0</span> pts
    </div>

    <!-- ZONE HÔTE -->
    <div id="host-zone" style="display:none;">
        <div class="mode-badge">🎛️ MODE HÔTE</div>

        <div id="host-panel">
            <h2>Contrôle des manches</h2>

            <button id="host-start-btn" class="btn" style="background: linear-gradient(135deg,#9b59b6,#3498db); font-size: 20px; padding: 16px 40px;"
                onclick="startRound()">▶ Lancer la manche</button>

            <div id="host-controls" style="display:none;">
                <p style="font-weight: bold; margin-bottom: 8px; color: #f39c12;">🎙️ Ordre des buzzes</p>
                <div id="buzz-list">
                    <p style="color:#888; font-size:14px;">En attente des buzzes…</p>
                </div>
                <div class="host-action-row">
                    <button class="btn" style="background:#e67e22;" onclick="continueAfterWrongAnswer()">↩ Mauvaise réponse</button>
                    <button class="btn" style="background:#555;" onclick="nextRound()">⏭ Manche suivante</button>
                </div>
            </div>
        </div>

        <button class="btn" style="background:#c0392b; font-size:13px; padding:8px 16px;" onclick="resetScores()">🗑 Réinitialiser les scores</button>
    </div>

    <!-- ZONE JOUEUR -->
    <div id="player-zone" style="display: none;">
        <h3 id="buzzer-status-text">⏳ Attends le lancement…</h3>
        <button id="buzzer-btn" onclick="buzz()" disabled>BUZZ !</button>
        <p id="buzzer-feedback"></p>
    </div>

    <!-- FIN DE MANCHE -->
    <div id="round-ended-zone" style="display: none;">
        <h2>Manche terminée !</h2>
        <h3 id="round-feedback" style="color: white;">En attente de la prochaine manche…</h3>
    </div>

    <!-- CLASSEMENT -->
    <div id="scoreboard-zone">
        <h3>🏆 Classement</h3>
        <ul id="score-list"></ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script>
        const IS_HOST = window.location.search.includes('host');
        if (IS_HOST) {
            document.getElementById('host-zone').style.display = 'block';
            document.title = '🎛️ Hôte — QuizzARL';
        } else {
            document.getElementById('login-zone').style.display = 'block';
        }
    </script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Quiz PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding-bottom: 60px; margin: 0; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 18px; border-radius: 8px; cursor: pointer; border: none; color: white; font-weight: bold; }
        input[type="text"] { padding: 10px; font-size: 16px; border-radius: 5px; border: none; width: 80%; max-width: 300px; }

        /* --- BUZZER --- */
        #buzzer-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff4444, #b00000);
            border: 8px solid #7a0000;
            box-shadow: 0 8px 0 #5a0000, 0 10px 20px rgba(0,0,0,0.6);
            font-size: 26px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.08s;
            margin: 30px auto;
            display: block;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #buzzer-btn:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #5a0000, 0 4px 10px rgba(0,0,0,0.6);
        }
        #buzzer-btn:disabled {
            background: radial-gradient(circle at 35% 35%, #555, #333);
            border-color: #222;
            box-shadow: 0 4px 0 #111;
            cursor: not-allowed;
            color: #888;
        }

        /* --- BUZZERS LIST (hôte) --- */
        .buzz-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 12px 18px;
            margin: 8px auto;
            max-width: 500px;
            border-left: 5px solid #e74c3c;
        }
        .buzz-entry:first-child { border-left-color: #f1c40f; }
        .buzz-entry .buzz-rank { font-size: 22px; margin-right: 12px; }
        .buzz-entry .buzz-name { font-size: 18px; font-weight: bold; flex: 1; text-align: left; }
        .buzz-correct-btn {
            padding: 8px 16px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .buzz-correct-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

    <h1>🎵 Blind Test Live</h1>
    
    <div id="login-zone">
        <input type="text" id="pseudo" placeholder="Entre ton pseudo...">
        <button class="btn" style="background: #3498db;" onclick="joinGame()">Rejoindre la partie</button>
    </div>

    <div id="player-score-zone" style="display: none; background: #f39c12; padding: 10px; margin: 10px auto; max-width: 400px; border-radius: 5px; color: black; font-weight: bold;">
        Mon Score : <span id="my-score">0</span> pts
    </div>

    <!-- ZONE HÔTE -->
    <div id="host-zone">
        <input type="text" id="youtube-search" placeholder="Rechercher un titre sur YouTube...">
        <button class="btn" style="background: #9b59b6;" onclick="searchYouTube()">Chercher</button>
        
        <div id="search-results" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px; max-width: 600px; margin-left: auto; margin-right: auto;"></div>

        <div id="host-controls" style="margin-top: 15px; display: none;">
            <p style="font-weight: bold; margin-bottom: 5px; color: #f39c12;">🎙️ Joueurs qui ont buzzé :</p>
            <div id="buzz-list"></div>
            <div style="margin-top: 20px;">
                <button class="btn" style="background: #e67e22;" onclick="continueAfterWrongAnswer()">⏩ Mauvaise réponse — Continuer la chanson</button>
                <button class="btn" style="background: #7f8c8d;" onclick="nextRound()">Manche suivante (Reset)</button>
            </div>
        </div>

        <div id="player"></div> 
    </div>

    <!-- ZONE JOUEUR -->
    <div id="player-zone" style="display: none;">
        <h3 id="buzzer-status-text">🎵 Écoute et buzze !</h3>
        <button id="buzzer-btn" onclick="buzz()">BUZZ !</button>
        <p id="buzzer-feedback" style="font-size: 16px; color: #aaa; min-height: 24px;"></p>
    </div>

    <div id="round-ended-zone" style="display: none; background: #2c3e50; padding: 20px; border-radius: 8px; margin: 20px auto; max-width: 400px;">
        <h2>Manche terminée !</h2>
        <h3 id="round-feedback" style="color: white;">En attente de la prochaine manche...</h3>
    </div>

    <div id="scoreboard-zone" style="margin-top: 30px; border-top: 2px solid #555; padding-top: 15px; max-width: 400px; margin-left: auto; margin-right: auto;">
        <h3>🏆 Classement Général</h3>
        <ul id="score-list" style="list-style-type: none; padding: 0;"></ul>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
